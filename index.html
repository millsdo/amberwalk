<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --ink:#15212B;--bg:#E9ECEA;--card:#FFFFFF;--line:#D6DBD8;--text:#1A2329;
    --muted:#5E6B72;--brand:#0B6E4F;--pos:#157F3B;--neg:#C23B2B;--gold:#BE810C;
    --nosol:#48586A;--spine:#C8D0CC;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:15px;line-height:1.4}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  header{position:sticky;top:0;z-index:1000;background:var(--ink);color:#fff;padding:calc(9px + env(safe-area-inset-top)) 14px 0;box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{font-weight:700;font-size:16px;letter-spacing:.2px}
  .brand small{font-weight:500;color:#9DB4AC;font-size:10px;display:block;letter-spacing:.14em;text-transform:uppercase}
  .me{display:flex;align-items:center;gap:6px;font-size:12px;color:#cfe0d9}
  .dot{width:8px;height:8px;border-radius:50%;background:#3FB87E}
  .dot.off{background:#C0653B}
  .me button{color:#9DB4AC;text-decoration:underline;font-size:12px}
  .progwrap{height:5px;background:rgba(255,255,255,.14);border-radius:99px;margin:9px 0 9px}
  .progbar{height:100%;width:0;background:var(--brand);border-radius:99px;transition:width .25s}
  .tabs{display:flex}
  .tab{flex:1;padding:10px 0;color:#9DB4AC;font-weight:600;font-size:12.5px;border-bottom:2px solid transparent;text-align:center}
  .tab.on{color:#fff;border-bottom-color:var(--brand)}
  .filters{background:#fff;border-bottom:1px solid var(--line);padding:9px 12px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .filters select,.filters input{font-size:16px;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:#fff;min-width:0}
  #q{flex:1;min-width:110px}
  .chip{font-size:12px;padding:6px 11px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:600;white-space:nowrap}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .banner{background:#EAF6EE;border-bottom:1px solid #c9e6d4;padding:8px 14px;font-size:13px;color:#0c5e41;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .banner button{color:var(--brand);font-weight:700;text-decoration:underline;font-size:13px}
  .bnRight{display:flex;gap:14px;align-items:center;white-space:nowrap}
  .bnOwner{color:var(--neg);font-weight:700;font-size:12px}

  #list{padding:4px 0 6px}
  .attrib{padding:10px 14px 90px;font-size:10.5px;color:var(--muted);text-align:center}
  .empty{padding:48px 24px;text-align:center;color:var(--muted)}
  .stop{display:flex;align-items:stretch;background:var(--card);border-bottom:1px solid var(--line)}
  .spine{position:relative;width:44px;flex:none;display:flex;justify-content:center;padding-top:14px}
  .spine:before{content:"";position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--spine);transform:translateX(-50%)}
  .stop:first-child .spine:before{top:14px}
  .wp{position:relative;z-index:2;width:32px;height:32px;border-radius:50%;background:#fff;border:2px solid var(--spine);color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
  .stop[data-st="pos"] .wp{border-color:var(--pos);color:var(--pos);background:#EAF6EE}
  .stop[data-st="neg"] .wp{border-color:var(--neg);color:var(--neg);background:#FBECEA}
  .stop[data-st="card"] .wp{border-color:var(--gold);color:var(--gold);background:#FBF3E2}
  .stop[data-st="nosol"] .wp{border-color:var(--nosol);color:var(--nosol);background:#EDF0F3}
  .mini{flex:none;width:72px;padding:12px 6px 0 0}
  .thumb{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid var(--line);background:#dde3df}
  .thumb img{display:block;width:72px;height:72px;object-fit:cover}
  .thumb.noimg{background:repeating-linear-gradient(45deg,#e7ece9,#e7ece9 6px,#dfe5e1 6px,#dfe5e1 12px)}
  .thumb .pin{position:absolute;width:13px;height:13px;border-radius:50% 50% 50% 0;background:var(--neg);border:2px solid #fff;transform:translate(-50%,-90%) rotate(-45deg);box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .body{flex:1;min-width:0;padding:11px 14px 12px 4px}
  .row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .addr{font-weight:650;font-size:15px;letter-spacing:-.1px}
  .pill{flex:none;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:99px;color:#fff;margin-top:1px}
  .pill.none{background:#E4E8E6;color:var(--muted)}

  .voter{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px dashed var(--line);font-size:14px}

  .vname{font-weight:600;flex:1}
  .vparty{font-size:11px;font-weight:600;color:var(--muted);background:#EEF1EF;padding:2px 7px;border-radius:5px;white-space:nowrap}
  .vphone{font-family:var(--mono);font-size:12.5px;color:var(--brand);text-decoration:none;font-weight:600}
  .acts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:12px 0 2px}
  .act{padding:11px 8px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:650;font-size:13.5px;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px}
  .act .d{width:9px;height:9px;border-radius:50%;flex:none}
  .act[data-k=pos] .d{background:var(--pos)}.act[data-k=neg] .d{background:var(--neg)}.act[data-k=card] .d{background:var(--gold)}.act[data-k=nosol] .d{background:var(--nosol)}
  .act.sel[data-k=pos]{background:var(--pos);border-color:var(--pos);color:#fff}
  .act.sel[data-k=neg]{background:var(--neg);border-color:var(--neg);color:#fff}
  .act.sel[data-k=card]{background:var(--gold);border-color:var(--gold);color:#fff}
  .act.sel[data-k=nosol]{background:var(--nosol);border-color:var(--nosol);color:#fff}

  .navlink:active{background:var(--brand);color:#fff}
  .note{width:100%;margin-top:9px;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-family:inherit;font-size:16px;resize:vertical;min-height:38px}
  .clearbtn{margin-top:8px;font-size:12.5px;color:var(--muted);font-weight:600;text-decoration:underline}

  /* Areas */
  #areas{padding:10px 12px 90px;display:none}
  .area{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:9px}
  .area h3{margin:0 0 2px;font-size:14.5px}
  .area .meta{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .area .bar{height:6px;background:#EEF1EF;border-radius:99px;margin:8px 0;overflow:hidden}
  .area .bar i{display:block;height:100%;background:var(--brand)}
  .area .arow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px}
  .area .owner{font-size:12.5px;font-weight:700}
  .area .owner.free{color:var(--muted);font-weight:600}
  .area .owner.mine{color:var(--brand)}
  .area .owner.taken{color:var(--neg)}
  .btn{padding:9px 14px;border-radius:9px;font-weight:700;font-size:13px}
  .btn.go{background:var(--brand);color:#fff}
  .btn.out{background:#fff;border:1px solid var(--line);color:var(--ink)}

  .mbtn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-weight:700;font-size:13px;box-shadow:0 1px 5px rgba(0,0,0,.2);color:var(--ink)}

  .mapsug button{display:block;width:100%;text-align:left;padding:11px 13px;font-size:14.5px;font-weight:600;border:none;border-bottom:1px solid var(--line);background:#fff;color:var(--text)}

  .mapsug button:active{background:#F1F4F2}

<header>
  <div class="htop">
    <div class="brand"><small>Live canvass · west → east · JUN22-search</small>AmberWalk</div>

<main>

  </div>

</main>

<div class="foot" id="walkfoot">
  <button class="fbtn ghost" id="exportbtn">Export</button>
  <button class="fbtn ghost" id="nextbtn">Next</button>
  <button class="fbtn primary" id="routebtn">Walk in Maps</button>
</div>

    <button id="namego">Start walking</button>
  </div>
</div>

<script>
const STOPS=JSON.parse(document.getElementById('data').textContent);
const CHUNKS=JSON.parse(document.getElementById('chunks').textContent);
const LBL={pos:'Contacted · Positive',neg:'Contacted · Negative',card:'Left Push Card',nosol:'No Solicitation',sign:'Left Sign',lit:'Left Literature'};
const SHORT={pos:'Positive',neg:'Negative',card:'Left card',nosol:'No solicit',sign:'Sign',lit:'Literature'};
const MCOLOR={pos:'#157F3B',neg:'#C23B2B',card:'#BE810C',nosol:'#48586A',sign:'#1F6FEB',lit:'#7A4FB0',none:'#9aa6ad'};
const ORDER=['pos','neg','card','lit','sign','nosol'];
function canon(arr){ return ORDER.filter(k=>arr.includes(k)); }
function primaryOf(arr){ for(const k of ORDER) if(arr.includes(k)) return k; return ''; }
function dotsHtml(arr){ return arr.map(k=>`<i style="background:${MCOLOR[k]}"></i>`).join(''); }
function labelOf(arr){ return arr.length===1?SHORT[arr[0]]:arr.length+' marks'; }
function wpStyle(arr){ const p=primaryOf(arr); return p?` style="border-color:${MCOLOR[p]};color:${MCOLOR[p]}"`:''; }
const byId={}; STOPS.forEach(s=>byId[s.id]=s);
const CH_STOPS={}; STOPS.forEach(s=>{(CH_STOPS[s.ch]=CH_STOPS[s.ch]||[]).push(s.id);});
STOPS.forEach(s=>{ s._q=(s.a+' '+s.s+' '+s.v.map(v=>v[0]).join(' ')).toLowerCase(); });

let walker=localStorage.getItem('aw_walker')||'';
let state={};       // id -> {st,note,walker,ts}
let claims={};      // chunkId -> {walker,ts}
let lastSync=0, online=false, pending=[];
let view='walk', fprec='', q='', todoOnly=false, activeChunk='', pendingOpen=0, mapQuery='', mapStreet='';

/* ---------- identity ---------- */
function setWalker(n){ walker=n.trim(); localStorage.setItem('aw_walker',walker); document.getElementById('mename').textContent=walker; }
function askName(){ document.getElementById('namemodal').classList.remove('hidden');
  const i=document.getElementById('nameinput'); i.value=walker; i.focus(); }
document.getElementById('namego').addEventListener('click',()=>{
  const v=document.getElementById('nameinput').value.trim();
  if(!v){ document.getElementById('nameinput').focus(); return; }
  setWalker(v); document.getElementById('namemodal').classList.add('hidden'); refreshAll();
});
document.getElementById('nameinput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('namego').click();});
document.getElementById('changeme').addEventListener('click',askName);

/* ---------- API + live sync ---------- */
async function apiGet(p){ const r=await fetch(p); if(!r.ok) throw 0; return r.json(); }
async function apiPost(p,b){ const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}); if(!r.ok) throw 0; return r.json(); }

function setNet(ok){ online=ok; document.getElementById('netdot').classList.toggle('off',!ok); }

async function pull(full){
  try{
    const d=await apiGet('/api/state'+(full?'':('?since='+lastSync)));
    lastSync=d.now; setNet(true);
    d.statuses.forEach(applyStatus);
    claims={}; d.claims.forEach(c=>claims[c.chunk_id]={walker:c.walker,ts:Number(c.ts)});
    updateProgress();
    if(view==='home') renderHome();
    if(view==='areas') renderAreas();
    if(view==='dash') renderDash();
    // NOTE: do NOT rebuild map markers here — that would close an open popup mid-edit.
    // Live status changes recolor markers in place via applyStatus().
    flushPending();
  }catch(e){ setNet(false); }
}
function applyStatus(row){
  const id=row.stop_id;
  if(!row.status && !row.note) delete state[id];
  else state[id]={st:row.status,note:row.note,walker:row.walker,ts:Number(row.ts)};
  const el=rowEl(id); if(el) refreshRow(el,byId[id]);
  if(markers[id]){ const li=(state[id]&&state[id].st)?state[id].st.split(','):[]; markers[id].setStyle({fillColor:MCOLOR[primaryOf(li)||'none']}); }
}
async function flushPending(){
  if(!pending.length) return; const keep=[];
  for(const m of pending){ try{ await apiPost('/api/mark',m); }catch(e){ keep.push(m); } }
  pending=keep;
}

/* ---------- marking ---------- */
function mark(id,list,note){
  const csv=canon(list).join(',');
  const has = csv || (note&&note.length);
  if(has) state[id]={st:csv,note:note||'',walker,ts:Date.now()};
  else delete state[id];
  const el=rowEl(id); if(el) refreshRow(el,byId[id]);
  if(markers[id]) markers[id].setStyle({fillColor:MCOLOR[primaryOf(canon(list))||'none']});
  updateProgress();
  const m={stopId:id,status:csv,note:note||'',walker};
  apiPost('/api/mark',m).then(()=>setNet(true)).catch(()=>{ setNet(false); pending.push(m); });
}

/* ---------- visibility / filters ---------- */
function visible(){
  return STOPS.filter(s=>{
    if(activeChunk && s.ch!==activeChunk) return false;
    if(fprec && s.p!==fprec) return false;
    if(todoOnly && state[s.id] && state[s.id].st) return false;
    if(q && !s._q.includes(q.toLowerCase())) return false;
    return true;
  });
}
function updateProgress(){
  const done=STOPS.filter(s=>state[s.id]&&state[s.id].st).length;
  document.getElementById('prog').style.width=(done/STOPS.length*100)+'%';
}

/* ---------- walk list ---------- */
const listEl=document.getElementById('list');
function rowEl(id){ return listEl.querySelector('.stop[data-id="'+id+'"]'); }
let renderTok=0;
function renderList(){
  const tok=++renderTok, vis=visible(); listEl.innerHTML='';
  if(!vis.length){ listEl.innerHTML='<div class="empty">No doors match these filters.</div>'; return; }
  let i=0;
  (function chunk(){
    if(tok!==renderTok) return;
    const frag=document.createDocumentFragment();
    const end=Math.min(i+120,vis.length);
    for(;i<end;i++) frag.appendChild(makeRow(vis[i]));
    listEl.appendChild(frag);
    if(i<vis.length) requestAnimationFrame(chunk);
    else if(pendingOpen){ const id=pendingOpen; pendingOpen=0; const el=rowEl(id);
      if(el){ el.scrollIntoView({block:'center'}); if(!el.classList.contains('open')) toggle(el,byId[id]); } }
  })();
}
const MZ=16,TS=72;
function tileXY(lat,lon){ const n=2**MZ;const xf=(lon+180)/360*n;const r=lat*Math.PI/180;
  const yf=(1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*n;const xt=Math.floor(xf),yt=Math.floor(yf);
  return {x:xt,y:yt,px:((xf-xt)*TS).toFixed(1),py:((yf-yt)*TS).toFixed(1)}; }
const TILE_SRCS=(z,x,y)=>[
  `https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/${z}/${y}/${x}`,
  `https://basemaps.cartocdn.com/light_all/${z}/${x}/${y}.png`,
  `https://tile.openstreetmap.org/${z}/${x}/${y}.png`];
const tileObs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){tileObs.unobserve(e.target);loadThumb(e.target);}}),{rootMargin:'400px'});
function loadThumb(t){ if(t.dataset.l)return; t.dataset.l='1';
  const srcs=TILE_SRCS(MZ,+t.dataset.x,+t.dataset.y); let i=0; const img=new Image(TS,TS); img.alt='';img.decoding='async';
  img.onerror=()=>{i++; if(i<srcs.length)img.src=srcs[i]; else t.classList.add('noimg');};
  t.insertBefore(img,t.firstChild); img.src=srcs[0]; }
function navAddr(s){ let a=s.a.replace(/\s+(Rm|Room|Apt|Unit|Ste|Suite|#|Lot|Bldg)\.?\s*\S*$/i,'').trim(); return encodeURIComponent(a+', '+s.c+', TN'); }
function gmapsTo(s){ return `https://www.google.com/maps/dir/?api=1&destination=${navAddr(s)}&travelmode=walking`; }
function gmapsRoute(ss){ const dest=navAddr(ss[ss.length-1]); const wp=ss.slice(0,-1).map(navAddr).join('|');
  let u=`https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=walking`; if(wp)u+='&waypoints='+wp; return u; }
function residents(v){ const n=v.map(x=>x[0]); return n.length<=2?n.join(', '):n.slice(0,2).join(', ')+' +'+(n.length-2); }
function rel(ts){ const m=Math.round((Date.now()-ts)/60000); if(m<1)return'just now'; if(m<60)return m+'m ago'; const h=Math.round(m/60); return h+'h ago'; }

function makeRow(s){
  const r=state[s.id], list=(r&&r.st)?r.st.split(','):[];
  const el=document.createElement('div'); el.className='stop'; el.dataset.id=s.id;
  const pill=list.length?`<span class="pill done">${dotsHtml(list)}${labelOf(list)}</span>`:`<span class="pill none">Open</span>`;
  const t=tileXY(s.lat,s.lon);
  const party=(s.v[0]&&s.v[0][1])?' · '+s.v[0][1]:'';
  const byline=(r&&r.walker)?` · <span class="by">${r.walker} ${rel(r.ts)}</span>`:'';
  el.innerHTML=`
    <div class="spine"><span class="wp"${wpStyle(list)}>${s.id}</span></div>
    <div class="mini" title="Open in Google Maps"><div class="thumb" data-x="${t.x}" data-y="${t.y}"><span class="pin" style="left:${t.px}px;top:${t.py}px"></span></div></div>
    <div class="body">
      <div class="row1"><span class="addr">${s.a}</span>${pill}</div>
      <div class="who">${residents(s.v)}</div>
      <div class="sub">${s.c} · Pct ${s.p}${party}${byline}</div>
      <div class="detail"></div>
    </div>`;
  el.querySelector('.mini').addEventListener('click',e=>{e.stopPropagation();window.open(gmapsTo(s),'_blank');});
  el.querySelector('.body').addEventListener('click',e=>{ if(e.target.closest('.detail'))return; toggle(el,s); });
  tileObs.observe(el.querySelector('.thumb'));
  return el;
}
function paintAct(b,k,sel){
  const dot=b.querySelector('.d');
  if(sel){ b.classList.add('sel'); b.style.background=MCOLOR[k]; b.style.borderColor=MCOLOR[k]; b.style.color='#fff'; if(dot)dot.style.background='#fff'; }
  else { b.classList.remove('sel'); b.style.background=''; b.style.borderColor=''; b.style.color=''; if(dot)dot.style.background=MCOLOR[k]; }
}
function buildDetail(el,s){
  const d=el.querySelector('.detail'); if(d.dataset.b)return; d.dataset.b='1';
  const r=state[s.id], list=(r&&r.st)?r.st.split(','):[], note=(r&&r.note)||'';
  d._sel=new Set(list);
  const voters=s.v.map(v=>{const ph=v[2]?`<a class="vphone" href="tel:${v[2].replace(/[^0-9]/g,'')}">${v[2]}</a>`:'';
    return `<div class="voter"><span class="vname">${v[0]}</span><span class="vparty">${v[1]}</span>${ph}</div>`;}).join('');
  const acts=ORDER.map(k=>`<button class="act" data-k="${k}"><span class="d"></span>${LBL[k]}</button>`).join('');
  d.innerHTML=`${voters}<div class="acts">${acts}</div>
    <textarea class="note" placeholder="Notes (optional)">${note}</textarea>
    <div class="confirmrow"><button class="confirmbtn" data-confirm>Confirm</button><button class="clrbtn" data-clear>Clear</button></div>
    <a class="navlink" target="_blank" rel="noopener" href="${gmapsTo(s)}">▸ Navigate here in Google Maps</a>`;
  d.querySelectorAll('.act').forEach(b=>{ const k=b.dataset.k; paintAct(b,k,d._sel.has(k));
    b.addEventListener('click',()=>{ if(d._sel.has(k))d._sel.delete(k); else d._sel.add(k); paintAct(b,k,d._sel.has(k)); });
  });
  d.querySelector('[data-confirm]').addEventListener('click',()=>{ mark(s.id,[...d._sel], d.querySelector('.note').value); showToast('Saved'); });
  d.querySelector('[data-clear]').addEventListener('click',()=>{ d._sel.clear(); mark(s.id,[], d.querySelector('.note').value); });
}
function rebuildDetail(el,s){ const d=el.querySelector('.detail'); d.dataset.b=''; d.innerHTML=''; buildDetail(el,s); }
function toggle(el,s){ if(el.classList.contains('open'))el.classList.remove('open'); else {buildDetail(el,s);el.classList.add('open');} }
function refreshRow(el,s){
  const r=state[s.id], list=(r&&r.st)?r.st.split(','):[];
  const wp=el.querySelector('.wp'); const p=primaryOf(list);
  wp.style.borderColor=p?MCOLOR[p]:''; wp.style.color=p?MCOLOR[p]:'';
  const pill=el.querySelector('.pill');
  if(list.length){ pill.className='pill done'; pill.innerHTML=dotsHtml(list)+labelOf(list); }
  else { pill.className='pill none'; pill.textContent='Open'; }
  const sub=el.querySelector('.sub');
  const party=(s.v[0]&&s.v[0][1])?' · '+s.v[0][1]:'';
  const byline=(r&&r.walker)?` · <span class="by">${r.walker} ${rel(r.ts)}</span>`:'';
  sub.innerHTML=`${s.c} · Pct ${s.p}${party}${byline}`;
  const d=el.querySelector('.detail'); if(d.dataset.b) rebuildDetail(el,s);
  if(todoOnly && list.length && view==='walk'){ el.style.display='none'; }
}

/* ---------- areas ---------- */
const areasEl=document.getElementById('areas');
function chunkProgress(cid){ const ids=CH_STOPS[cid]||[]; const done=ids.filter(id=>state[id]&&state[id].st).length; return {done,total:ids.length}; }
function renderAreas(){
  areasEl.innerHTML='';
  CHUNKS.forEach(c=>{
    const p=chunkProgress(c.id), pct=p.total?Math.round(p.done/p.total*100):0;
    const owner=claims[c.id]&&claims[c.id].walker;
    const mine=owner&&owner===walker;
    let ownerHtml, btnHtml;
    const prev=`<button class="btn out" data-preview="${c.id}">Preview</button>`;
    if(!owner){ ownerHtml=`<span class="owner free">Unclaimed</span>`; btnHtml=`${prev} <button class="btn go" data-claim="${c.id}">Claim & walk</button>`; }
    else if(mine){ ownerHtml=`<span class="owner mine">You're walking this</span>`; btnHtml=`${prev} <button class="btn go" data-go="${c.id}">Open list</button> <button class="btn out" data-release="${c.id}">Release</button>`; }
    else { ownerHtml=`<span class="owner taken">Claimed by ${owner}</span>`; btnHtml=`${prev}`; }
    const el=document.createElement('div'); el.className='area';
    el.innerHTML=`<h3>${c.label.split(' · ').slice(1).join(' · ')}</h3>
      <div class="meta">${c.label.split(' · ')[0]} · ${p.done}/${p.total} knocked (${pct}%)</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="arow">${ownerHtml}<div>${btnHtml}</div></div>`;
    areasEl.appendChild(el);
  });
  areasEl.querySelectorAll('[data-claim]').forEach(b=>b.addEventListener('click',()=>claimArea(b.dataset.claim)));
  areasEl.querySelectorAll('[data-release]').forEach(b=>b.addEventListener('click',()=>releaseArea(b.dataset.release)));
  areasEl.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>openArea(b.dataset.go)));
  areasEl.querySelectorAll('[data-preview]').forEach(b=>b.addEventListener('click',()=>previewArea(b.dataset.preview)));
}
async function claimArea(cid){
  if(!walker){ askName(); return; }
  claims[cid]={walker,ts:Date.now()}; renderAreas();
  try{ const r=await apiPost('/api/claim',{chunkId:cid,walker});
    if(!r.ok && r.owner){ claims[cid]={walker:r.owner,ts:Date.now()}; renderAreas(); showToast('Already claimed by '+r.owner); return; }
  }catch(e){ setNet(false); }
  openArea(cid);
}
async function releaseArea(cid){ delete claims[cid]; renderAreas();
  try{ await apiPost('/api/release',{chunkId:cid,walker}); }catch(e){ setNet(false); } }
function openArea(cid){ activeChunk=cid; fprec=''; document.getElementById('fprec').value='';
  updateBanner(); switchView('walk'); renderList(); }
function updateBanner(){
  const b=document.getElementById('areaBanner');
  if(activeChunk){
    const c=CHUNKS.find(x=>x.id===activeChunk);
    const label=c?c.label.split(' · ').slice(1).join(' · '):activeChunk;
    const owner=claims[activeChunk]&&claims[activeChunk].walker, mine=owner===walker;
    let mid='';
    if(!owner) mid=`<button id="bnClaim">Claim & walk</button>`;
    else if(!mine) mid=`<span class="bnOwner">Claimed by ${owner}</span>`;
    const verb=(owner&&mine)?'Walking':'Viewing';
    b.innerHTML=`<span>${verb} <b>${label}</b></span><span class="bnRight">${mid}<button id="clearArea">Show all</button></span>`;
    b.classList.remove('hidden');
    document.getElementById('clearArea').onclick=()=>{activeChunk='';b.classList.add('hidden');renderList();if(view==='map'&&map)refreshMarkers();};
    const bc=document.getElementById('bnClaim'); if(bc) bc.onclick=()=>claimArea(activeChunk);
  } else b.classList.add('hidden');
}
function fitActive(){ if(!map) return; const v=visible(); if(v.length) map.fitBounds(L.latLngBounds(v.map(s=>[s.lat,s.lon])).pad(.15)); }
function previewArea(cid){ activeChunk=cid; updateBanner(); switchView('map'); setTimeout(fitActive,140); }

/* ---------- map ---------- */
let map,markers={},layer,userMarker,accCircle,locating=false,firstFix=false;
function initMap(){
  if(map){ setTimeout(()=>map.invalidateSize(),60); refreshMarkers(); return; }
  map=L.map('map',{preferCanvas:true}).setView([35.235,-89.78],12);
  const streets=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'});
  const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Imagery &copy; Esri'});
  const labels=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}',{maxZoom:19});
  streets.addTo(map);
  L.control.layers(
    {'Streets (house outlines)':streets,'Satellite (rooftops)':sat},
    {'Street names':labels},
    {position:'topleft',collapsed:true}
  ).addTo(map);
  layer=L.layerGroup().addTo(map); refreshMarkers();
  map.on('movestart',hideSug);
  const v=visible(); if(v.length) map.fitBounds(L.latLngBounds(v.map(s=>[s.lat,s.lon])).pad(.1));
  map.on('locationfound',e=>{
    if(!userMarker){
      userMarker=L.circleMarker(e.latlng,{radius:8,color:'#fff',weight:3,fillColor:'#1C6BEF',fillOpacity:1}).addTo(map);
      accCircle=L.circle(e.latlng,{radius:e.accuracy,color:'#1C6BEF',weight:1,fillColor:'#1C6BEF',fillOpacity:.12}).addTo(map);
    } else { userMarker.setLatLng(e.latlng); accCircle.setLatLng(e.latlng).setRadius(e.accuracy); }
    if(firstFix){ firstFix=false; map.setView(e.latlng, Math.max(map.getZoom(),16)); }
  });
  map.on('locationerror',()=>{ locating=false; showToast('Location unavailable — allow access in Settings'); });
}
function locateMe(){
  if(!map) return;
  if(!navigator.geolocation){ showToast('No geolocation on this device'); return; }
  if(userMarker){ map.setView(userMarker.getLatLng(), Math.max(map.getZoom(),16)); return; }
  showToast('Locating…'); firstFix=true; locating=true;
  map.locate({watch:true, enableHighAccuracy:true, maximumAge:4000, timeout:15000});
}
const GENDER={M:'Male',F:'Female'};
function popupHtml(s){
  const r=state[s.id], list=(r&&r.st)?r.st.split(','):[];
  const voters=s.v.map(v=>{
    const g=GENDER[v[3]]?' · '+GENDER[v[3]]:'';
    const ph=v[2]?' · <a href="tel:'+v[2].replace(/[^0-9]/g,'')+'">'+v[2]+'</a>':'';
    return `<div class="lpv"><b>${v[0]}</b><div class="lpm">${v[1]}${g}${ph}</div></div>`;
  }).join('');
  const status= list.length?`<span class="lpst" style="background:${MCOLOR[primaryOf(list)]}">${list.map(k=>SHORT[k]).join(', ')}${r.walker?' · '+r.walker+' '+rel(r.ts):''}</span>`:'';
  const acts=ORDER.map(k=>`<button class="pk" data-k="${k}">${SHORT[k]}</button>`).join('');
  return `<div class="lpop"><div class="lpa">#${s.id} · ${s.a}</div>
    <div class="lpc">${s.c} · Pct ${s.p}</div>${status}${voters}
    <div class="lpacts">${acts}</div>
    <div class="lpbtns"><button class="popbtn nav" data-nav>Navigate</button><button class="popbtn open" data-confirm>Confirm</button></div>
    <button class="lpopen" data-open>Open in list</button></div>`;
}
function paintPk(b,k,sel){ if(sel){b.classList.add('sel');b.style.background=MCOLOR[k];b.style.borderColor=MCOLOR[k];b.style.color='#fff';} else {b.classList.remove('sel');b.style.background='';b.style.borderColor='';b.style.color='';} }
function wirePopup(n,s,m){
  if(!n) return;
  const r=state[s.id]; if(!n._sel) n._sel=new Set((r&&r.st)?r.st.split(','):[]);
  const nav=n.querySelector('[data-nav]'); if(nav) nav.onclick=()=>window.open(gmapsTo(s),'_blank');
  const op=n.querySelector('[data-open]'); if(op) op.onclick=()=>{ pendingOpen=s.id; m.closePopup(); switchView('walk'); renderList(); };
  n.querySelectorAll('.pk').forEach(b=>{ const k=b.dataset.k; paintPk(b,k,n._sel.has(k));
    b.onclick=()=>{ if(n._sel.has(k))n._sel.delete(k); else n._sel.add(k); paintPk(b,k,n._sel.has(k)); };
  });
  const cf=n.querySelector('[data-confirm]'); if(cf) cf.onclick=()=>{
    mark(s.id,[...n._sel]); const sel=new Set([...n._sel]);
    m.setPopupContent(popupHtml(s));
    const nn=m.getPopup().getElement(); if(nn){ nn._sel=sel; wirePopup(nn,s,m); }
    showToast('Saved');
  };
}
function mapSet(){
  if(mapStreet) return STOPS.filter(s=>s.s===mapStreet);
  if(mapQuery){ const t=mapQuery.toLowerCase(); return STOPS.filter(s=>s._q.includes(t)); }
  return visible();
}
function refreshMarkers(){
  layer.clearLayers(); markers={};
  mapSet().forEach(s=>{ const list=(state[s.id]&&state[s.id].st)?state[s.id].st.split(','):[];
    const m=L.circleMarker([s.lat,s.lon],{radius:6,weight:1.5,color:'#fff',fillColor:MCOLOR[primaryOf(list)||'none'],fillOpacity:.95});
    m.bindPopup(()=>popupHtml(s),{maxWidth:280,minWidth:210,maxHeight:330,autoPan:true});
    m.on('popupopen',e=>wirePopup(e.popup.getElement(), s, m));
    m.addTo(layer); markers[s.id]=m; });
}

/* ---------- dashboard ---------- */
function renderDash(){
  const el=document.getElementById('dash');
  const done=STOPS.filter(s=>state[s.id]&&state[s.id].st);
  const cnt={pos:0,neg:0,card:0,nosol:0,sign:0,lit:0}; done.forEach(s=>state[s.id].st.split(',').forEach(k=>{ if(k in cnt) cnt[k]++; }));
  const byP={}; STOPS.forEach(s=>{(byP[s.p]=byP[s.p]||{t:0,d:0}).t++; if(state[s.id]&&state[s.id].st)byP[s.p].d++;});
  const byW={}; done.forEach(s=>{const w=state[s.id].walker||'(unknown)'; byW[w]=(byW[w]||0)+1;});
  const activeWalkers=new Set([...Object.keys(byW),...Object.values(claims).map(c=>c.walker)].filter(Boolean));
  const pct=Math.round(done.length/STOPS.length*100);
  const prrow=Object.keys(byP).sort().map(p=>{const x=byP[p];const pc=Math.round(x.d/x.t*100);
    return `<tr><td>Pct ${p}</td><td class="num">${x.d}/${x.t}</td><td><div class="miniprog"><i style="width:${pc}%"></i></div></td><td class="num">${pc}%</td></tr>`;}).join('');
  const wrow=Object.entries(byW).sort((a,b)=>b[1]-a[1]).map(([w,n])=>`<tr><td>${w}</td><td class="num">${n}</td></tr>`).join('')||'<tr><td colspan="2">No doors knocked yet</td></tr>';
  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="n">${done.length}</div><div class="l">doors knocked (${pct}%)</div></div>
      <div class="kpi"><div class="n">${STOPS.length-done.length}</div><div class="l">remaining</div></div>
      <div class="kpi"><div class="n" style="color:var(--pos)">${cnt.pos}</div><div class="l">positive</div></div>
      <div class="kpi"><div class="n" style="color:var(--neg)">${cnt.neg}</div><div class="l">negative</div></div>
      <div class="kpi"><div class="n" style="color:${MCOLOR.card}">${cnt.card}</div><div class="l">left card</div></div>
      <div class="kpi"><div class="n" style="color:${MCOLOR.sign}">${cnt.sign}</div><div class="l">left sign</div></div>
      <div class="kpi"><div class="n" style="color:${MCOLOR.lit}">${cnt.lit}</div><div class="l">left literature</div></div>
      <div class="kpi"><div class="n">${activeWalkers.size}</div><div class="l">walkers active</div></div>
    </div>
    <div class="dh">Progress by precinct</div>
    <table><tr><th>Precinct</th><th class="num">Done</th><th></th><th class="num">%</th></tr>${prrow}</table>
    <div class="dh">Doors by walker</div>
    <table><tr><th>Walker</th><th class="num">Knocked</th></tr>${wrow}</table>
    <div class="dh">Export</div>
    <button class="fbtn primary" id="exportall" style="width:100%;padding:12px;border-radius:10px">Export all results (CSV)</button>`;
  el.querySelector('#exportall').addEventListener('click',exportCSV);
}
function renderHome(){
  const el=document.getElementById('home');
  const done=STOPS.filter(s=>state[s.id]&&state[s.id].st).length;
  const pct=Math.round(done/STOPS.length*100);
  const mine=Object.entries(claims).find(([cid,c])=>c.walker===walker);
  const resume= mine?`<button class="hresume" data-resume="${mine[0]}">Resume my area ▸</button>`:'';
  el.innerHTML=`
    <div class="hhead">
      <div class="hgreet">Hi${walker?', '+walker:''}</div>
      <div class="hstat">${done.toLocaleString()} of ${STOPS.length.toLocaleString()} doors knocked · ${pct}%</div>
      <div class="hbar"><i style="width:${pct}%"></i></div>
    </div>
    ${resume}
    <div class="hgrid">
      <button class="hcard" data-go="walk"><div class="hic">📋</div><div class="ht">My Walk</div><div class="hd">Knock the door list, west to east</div></button>
      <button class="hcard" data-go="areas"><div class="hic">📍</div><div class="ht">Areas</div><div class="hd">Claim a turf to walk</div></button>
      <button class="hcard" data-go="map"><div class="hic">🗺️</div><div class="ht">Map</div><div class="hd">See doors on the map</div></button>
      <button class="hcard" data-go="dash"><div class="hic">📊</div><div class="ht">Dashboard</div><div class="hd">Team progress & export</div></button>
    </div>`;
  el.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>switchView(b.dataset.go)));
  const rb=el.querySelector('[data-resume]'); if(rb) rb.addEventListener('click',()=>openArea(rb.dataset.resume));
}
function exportCSV(){
  const head=['Stop','Address','City','Precinct','Status','Walker','Notes','Voters'];
  const rows=[head];
  STOPS.forEach(s=>{const r=state[s.id]; if(!r||(!r.st&&!r.note))return;
    rows.push([s.id,s.a,s.c,s.p,r.st?r.st.split(',').map(k=>LBL[k]).join('; '):'',r.walker||'',(r.note||'').replace(/\n/g,' '),s.v.map(v=>v[0]).join('; ')]);});
  if(rows.length===1){showToast('No results yet');return;}
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='amberwalk-results.csv'; a.click(); showToast('Exported '+(rows.length-1)+' results');
}

/* ---------- footer actions ---------- */
document.getElementById('nextbtn').addEventListener('click',()=>{
  const vis=visible(); const next=vis.find(s=>!(state[s.id]&&state[s.id].st))||vis[0];
  if(!next){showToast('Nothing left here');return;}
  const el=rowEl(next.id); if(el){el.scrollIntoView({behavior:'smooth',block:'center'}); if(!el.classList.contains('open'))toggle(el,next);}
});
const ROUTE_MAX=9;
document.getElementById('routebtn').addEventListener('click',()=>{
  const vis=visible(); let b=vis.filter(s=>!(state[s.id]&&state[s.id].st)); if(!b.length)b=vis; b=b.slice(0,ROUTE_MAX);
  if(!b.length){showToast('No stops to route');return;}
  showToast('Opening '+b.length+' stops in Google Maps'); window.open(gmapsRoute(b),'_blank');
});
document.getElementById('exportbtn').addEventListener('click',exportCSV);

/* ---------- filters ---------- */
function fillPrec(){ const fp=document.getElementById('fprec');
  [...new Set(STOPS.map(s=>s.p))].sort().forEach(p=>fp.add(new Option('Precinct '+p,p))); }
document.getElementById('fprec').addEventListener('change',e=>{fprec=e.target.value;activeChunk='';updateBanner();renderList();});
let qT; document.getElementById('q').addEventListener('input',e=>{clearTimeout(qT);qT=setTimeout(()=>{q=e.target.value.trim();renderList();},200);});
document.getElementById('ftodo').addEventListener('click',e=>{todoOnly=!todoOnly;e.target.classList.toggle('on',todoOnly);renderList();});

/* ---------- views ---------- */
function switchView(v){
  view=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.view===v));
  document.getElementById('home').style.display=v==='home'?'block':'none';
  document.getElementById('walkview').style.display=v==='walk'?'':'none';
  document.getElementById('filters').style.display=v==='walk'?'':'none';
  document.getElementById('areas').style.display=v==='areas'?'block':'none';
  document.getElementById('mapview').style.display=v==='map'?'block':'none';
  document.getElementById('dash').style.display=v==='dash'?'block':'none';
  document.body.className='tab-'+v;
  if(v!=='map' && map && locating){ map.stopLocate(); locating=false; }
  if(v==='home')renderHome();
  if(v==='areas')renderAreas(); if(v==='dash')renderDash(); if(v==='map')initMap();
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchView(t.dataset.view)));
document.getElementById('locatebtn').addEventListener('click',locateMe);
const STREETS=[...new Set(STOPS.map(s=>s.s))].sort();
const mapqEl=document.getElementById('mapq');
let mqT;
mapqEl.addEventListener('input',e=>{ const v=e.target.value.trim(); mapStreet=''; mapQuery=v; showSug(v);
  clearTimeout(mqT); mqT=setTimeout(()=>applyMapSearch(false),180); });
mapqEl.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const first=document.querySelector('#mapsug button'); if(first){ first.click(); } else { applyMapSearch(true); } mapqEl.blur(); } });
document.getElementById('mapqx').addEventListener('click',()=>{ mapqEl.value=''; mapQuery=''; mapStreet=''; hideSug(); applyMapSearch(false); mapqEl.focus(); });
function showSug(v){
  const s=document.getElementById('mapsug'); if(!v){ hideSug(); return; }
  const t=v.toLowerCase();
  const pre=[],mid=[];
  for(const x of STREETS){ const lx=x.toLowerCase(); if(lx.startsWith(t))pre.push(x); else if(lx.includes(t))mid.push(x); }
  const matches=pre.concat(mid).slice(0,8);
  if(!matches.length){ hideSug(); return; }
  s.innerHTML=matches.map(x=>{const c=STOPS.filter(d=>d.s===x).length;
    return `<button data-st="${x.replace(/"/g,'&quot;')}">${x}<span class="cnt">${c} door${c===1?'':'s'}</span></button>`;}).join('');
  s.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>pickStreet(b.dataset.st)));
  s.classList.add('show');
}
function hideSug(){ const s=document.getElementById('mapsug'); if(s){ s.classList.remove('show'); s.innerHTML=''; } }
function pickStreet(st){ mapStreet=st; mapQuery=''; mapqEl.value=st; hideSug(); applyMapSearch(true);
  const v=mapSet(); showToast(v.length+' door'+(v.length===1?'':'s')+' on '+st); }
function applyMapSearch(zoom){ if(!map) return; refreshMarkers(); const v=mapSet();
  if(zoom && v.length) map.fitBounds(L.latLngBounds(v.map(s=>[s.lat,s.lon])).pad(.25)); }
document.getElementById('refreshbtn').addEventListener('click',async()=>{
  const b=document.getElementById('refreshbtn'); b.classList.add('spin');
  await pull(true);
  setTimeout(()=>b.classList.remove('spin'),550);
  showToast('Updated');
});

function refreshAll(){ renderList(); updateProgress(); if(view==='home')renderHome(); if(view==='areas')renderAreas(); if(view==='dash')renderDash(); }

/* ---------- toast ---------- */
let toastT; const toastEl=document.getElementById('toast');
function showToast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),1400);}

/* ---------- boot ---------- */
(async function(){
  fillPrec();
  if(walker){ document.getElementById('mename').textContent=walker; document.getElementById('namemodal').classList.add('hidden'); }
  else askName();
  await pull(true);
  renderList();
  switchView('home');
  setInterval(pull,4000);
})();
</script>
</body>
</html>
