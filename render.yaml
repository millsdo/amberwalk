# Render Blueprint: provisions the web service + a Postgres database and wires them together.
databases:
  - name: amberwalk-db
    plan: free            # NOTE: free Postgres expires after ~30 days. Use "basic" for the campaign.

services:
  - type: web
    name: amberwalk
    runtime: node
    plan: free            # NOTE: free web services sleep when idle. Use "starter" ($7/mo) for live walks.
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: amberwalk-db
          property: connectionString
